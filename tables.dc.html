<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
</head>
<body>
<template id="__bundler_thumbnail" data-bg-color="#faf8f2">
  <svg viewBox="0 0 1200 800" xmlns="http://www.w3.org/2000/svg">
    <rect width="1200" height="800" fill="#faf8f2"></rect>
    <text x="600" y="430" text-anchor="middle" font-family="Georgia,serif" font-size="150" fill="#97a673">שולחנות</text>
  </svg>
</template>
<x-dc>
<helmet>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin="">
<link href="https://fonts.googleapis.com/css2?family=Frank+Ruhl+Libre:wght@300;400;500;700&amp;family=Heebo:wght@300;400;500&amp;display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; }
  #search-input::placeholder { color: #a9ad95; opacity: 1; }
  #search-input:focus { outline: none; border-color: #97a673; box-shadow: 0 0 0 3px rgba(151,166,115,0.16); }
</style>
</helmet>
<div dir="rtl" style="min-height:100vh; width:100%; max-width:520px; margin:0 auto; background:#faf8f2; font-family:'Heebo',sans-serif; color:#46443c; position:relative; overflow:hidden; padding-bottom:180px;">

  <div style="position:fixed; top:0; left:0; right:0; z-index:60; pointer-events:none;">
    <div style="position:relative; max-width:520px; margin:0 auto;">
      <a href="Index.dc.html" aria-label="חזרה" style="pointer-events:auto; position:absolute; top:22px; right:22px; width:46px; height:46px; border-radius:50%; background:rgba(255,255,255,0.85); border:1px solid #e2e3d4; box-shadow:0 4px 14px rgba(120,125,90,0.1); display:flex; align-items:center; justify-content:center; text-decoration:none;">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="#7e8e5b" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M9 6l6 6-6 6"></path></svg>
      </a>
    </div>
  </div>

  <!-- header -->
  <div style="text-align:center; padding:64px 28px 18px;">
    <div style="font-family:'Frank Ruhl Libre',serif; font-weight:500; font-size:30px; letter-spacing:1px; color:#97a673;">לירון <span style="font-size:19px; color:#b6bd9c;">&amp;</span> דניאל</div>
    <div style="font-size:13px; letter-spacing:5px; color:#9aa17f; margin-top:6px;">06.08.2026</div>
    <div style="display:flex; align-items:center; justify-content:center; gap:14px; margin-top:20px;">
      <span style="height:1px; width:46px; background:#cdd0bb;"></span>
      <span style="font-family:'Frank Ruhl Libre',serif; font-size:26px; letter-spacing:6px; color:#5f6647;">שולחנות</span>
      <span style="height:1px; width:46px; background:#cdd0bb;"></span>
    </div>
  </div>

  <!-- sticky search bar -->
  <div id="search-bar" style="position: sticky; top: 0; z-index: 20; background: #faf8f2; padding: 12px 22px 14px 22px; border-bottom: 1px solid #ececdf">
    <div style="position:relative;">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#a9ad95" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" style="position:absolute; top:50%; right:16px; transform:translateY(-50%); pointer-events:none;">
        <circle cx="11" cy="11" r="7"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line>
      </svg>
      <input id="search-input" type="text" placeholder="שם" value="{{ query }}" onInput="{{ onSearch }}" autocomplete="off" dir="rtl" style="width: 100%; padding: 15px 50px 15px 18px; font-family: 'Heebo',sans-serif; font-size: 19px; color: #46443c; background: #ffffff; border: 1px solid #d8dcc4; border-radius: 25px; box-shadow: 0 4px 14px rgba(120,125,90,0.06); transition: border-color .15s ease, box-shadow .15s ease">
    </div>
  </div>

  <!-- grid -->
  <div style="display:flex; flex-direction:column; gap:20px; padding:22px 22px 0; position:relative; z-index:2;">
    <sc-for list="{{ tables }}" as="t" hint-placeholder-count="6">
      <div ref="{{ t.setRef }}" style="position:relative; background:rgba(255,255,255,0.72); border:1px solid #e2e3d4; border-radius:14px; padding:22px 22px 26px; box-shadow:0 4px 16px rgba(120,125,90,0.06);">
        <sc-if value="{{ t.isFirst }}" hint-placeholder-val="{{ false }}">
          <span style="position:absolute; inset:-2px; border:2px solid #97a673; border-radius:16px; pointer-events:none; box-shadow:0 0 0 4px rgba(151,166,115,0.14);"></span>
        </sc-if>
        <div style="display:flex; align-items:center; justify-content:center; gap:14px; margin-bottom:18px;">
          <span style="height:1px; flex:1; background:#e6e7d8;"></span>
          <span style="width:52px; height:52px; border-radius:50%; border:1px solid #b6bd9c; color:#7e8e5b; font-family:'Frank Ruhl Libre',serif; font-size:26px; display:flex; align-items:center; justify-content:center;">{{ t.num }}</span>
          <span style="height:1px; flex:1; background:#e6e7d8;"></span>
        </div>
        <div style="display:grid; grid-template-columns:1fr 1fr; gap:10px 16px;">
          <sc-for list="{{ t.names }}" as="n" hint-placeholder-count="8">
            <sc-if value="{{ n.hit }}" hint-placeholder-val="{{ false }}">
              <span style="font-size:20px; color:#5f6647; font-weight:500; text-align:center; line-height:1.5; background:#e8edd8; border-radius:8px; padding:3px 6px;">{{ n.text }}</span>
            </sc-if>
            <sc-if value="{{ n.notHit }}" hint-placeholder-val="{{ true }}">
              <span style="font-size:20px; color:#54524a; text-align:center; line-height:1.5; padding:3px 6px;">{{ n.text }}</span>
            </sc-if>
          </sc-for>
        </div>
      </div>
    </sc-for>
  </div>

  <!-- floral footer -->
  <img src="flowers2.png" alt="" style="position:absolute; bottom:0; left:0; width:100%; display:block; pointer-events:none; z-index:1;">

</div>
</x-dc>
<script type="text/x-dc" data-dc-script>
class Component extends DCLogic {
  state = { query: "" };
  refsMap = {};

  baseTables() {
    const names = ["רון","מאיה","יואב","נועה","איתי","שירה","עומר","תמר","גיא","ליאת","אורי","דנה"];
    const tables = [];
    for (let i = 1; i <= 20; i++) tables.push({ num: i, names });
    return tables;
  }

  compute(q) {
    const query = (q || "").trim();
    let firstMatch = null;
    const tables = this.baseTables().map((t) => {
      let hasHit = false;
      const names = t.names.map((name) => {
        const hit = query.length > 0 && name.includes(query);
        if (hit) hasHit = true;
        return { text: name, hit, notHit: !hit };
      });
      if (hasHit && firstMatch === null) firstMatch = t.num;
      return { num: t.num, names, hasHit };
    });
    return { tables, firstMatch, hasQuery: query.length > 0 };
  }

  scrollToFirst(v) {
    const m = this.compute(v);
    if (!m.firstMatch) return;
    const el = this.refsMap[m.firstMatch];
    if (!el) return;
    const bar = document.getElementById('search-bar');
    const offset = (bar ? bar.offsetHeight : 70) + 16;
    const y = el.getBoundingClientRect().top + window.scrollY - offset;
    window.scrollTo({ top: Math.max(0, y), behavior: 'smooth' });
  }

  renderVals() {
    const m = this.compute(this.state.query);
    return {
      query: this.state.query,
      onSearch: (e) => {
        const v = e.target.value;
        this.setState({ query: v });
        clearTimeout(this._t);
        this._t = setTimeout(() => this.scrollToFirst(v), 70);
      },
      tables: m.tables.map((t) => ({
        ...t,
        isFirst: m.hasQuery && t.num === m.firstMatch,
        setRef: (el) => { this.refsMap[t.num] = el; }
      }))
    };
  }
}
</script>
</body>
</html>
